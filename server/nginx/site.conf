server {
    listen 80;
    server_name www.qjzxmd.cn qjzxmd.cn;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.qjzxmd.cn qjzxmd.cn;

    ssl_certificate /home/qjzxmd.cn/qjzxmd.cn_bundle.crt;
    ssl_certificate_key /home/qjzxmd.cn/qjzxmd.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /home/ubuntu/smart-school/web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location ^~ /uploads/ {
        alias /home/ubuntu/smart-school/server/uploads/;
        expires 7d;
    }

    location = /uploads {
        return 301 $scheme://$host$request_uri/;
    }
}
