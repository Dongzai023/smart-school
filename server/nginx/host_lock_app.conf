# 希沃锁定屏幕管理系统 - 宿主机 Nginx 配置文件 (lock.qjzxmd.cn)
# 部署建议：将此内容保存到服务器的 /etc/nginx/sites-available/lock.qjzxmd.cn 
# 然后 sudo ln -s /etc/nginx/sites-available/lock.qjzxmd.cn /etc/nginx/sites-enabled/

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name lock.qjzxmd.cn;
    return 301 https://$host$request_uri;
}

# HTTPS 配置
server {
    listen 443 ssl http2;
    server_name lock.qjzxmd.cn;

    # 使用你现有的证书路径
    ssl_certificate /etc/nginx/ssl/qjzxmd.cn/qjzxmd.cn_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/qjzxmd.cn/qjzxmd.cn.key;

    # SSL 优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    client_max_body_size 10M;

    # 1. 前端管理后台 (Vue SPA)
    location / {
        root /opt/lock-screen/web/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. 后端 API 反向代理 (指向 Docker 映射的 8002 端口)
    location /api/ {
        proxy_pass http://127.0.0.1:8002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. WebSocket 代理 (Agent 连接)
    location /ws/ {
        proxy_pass http://127.0.0.1:8002/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 4. 锁屏图片静态访问
    location /uploads/ {
        alias /opt/lock-screen/server/uploads/;
        expires 7d;
        access_log off;
    }

    # 5. 兼容旧版及当前代码的图片访问 (直接由 Nginx 服务，解决 404 问题)
    location /api/images/file/ {
        alias /opt/lock-screen/server/uploads/;
        expires 7d;
        access_log off;
    }
}
