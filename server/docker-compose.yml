version: '3.8'

services:
  # MySQL Database (internal only, not exposed to public)
  db:
    image: mysql:8.0
    container_name: lock_screen_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-lock_screen}
      MYSQL_USER: ${DB_USER:-lock_screen}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_CHARSET: utf8mb4
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - internal

  # Redis Cache (internal only)
  redis:
    image: redis:7-alpine
    container_name: lock_screen_redis
    restart: always
    networks:
      - internal

  # Backend API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lock_screen_api
    restart: always
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db
      - redis
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  mysql_data:
