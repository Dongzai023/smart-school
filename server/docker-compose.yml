version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: signature-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: signature_db
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123456" ]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: signature-api
    restart: always
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: mysql+pymysql://root:root123456@mysql:3306/signature_db?charset=utf8mb4
      SECRET_KEY: qingjian-middle-school-attendance-secret-key-2026
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
