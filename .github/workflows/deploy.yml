name: Deploy to Tencent Cloud

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  SERVER_HOST: ${{ secrets.SERVER_HOST }}
  SERVER_USER: ${{ secrets.SERVER_USER }}
  DEPLOY_PATH: /opt/smart-school

jobs:
  build-frontend:
    name: Build Vue Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package.json

      - name: Install dependencies
        working-directory: web
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build production bundle
        working-directory: web
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Create remote directories
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "mkdir -p ${{ env.DEPLOY_PATH }}/server ${{ env.DEPLOY_PATH }}/web/dist ${{ env.DEPLOY_PATH }}/agent ${{ env.DEPLOY_PATH }}/miniprogram"

      - name: Sync server files
        run: |
          rsync -avz --delete \
            --exclude='.env' \
            --exclude='uploads/*' \
            --exclude='nginx/ssl/*' \
            --exclude='mysql_data' \
            --exclude='__pycache__' \
            server/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/server/

      - name: Sync frontend build
        run: |
          rsync -avz --delete \
            web/dist/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/web/dist/

      - name: Sync agent files
        run: |
          rsync -avz --delete \
            --exclude='config.yaml' \
            --exclude='cache/' \
            --exclude='*.log' \
            agent/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/agent/

      - name: Sync miniprogram files
        run: |
          rsync -avz --delete \
            --exclude='node_modules/' \
            --exclude='.git/' \
            miniprogram/ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/miniprogram/

      - name: Deploy on server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            cd ${{ env.DEPLOY_PATH }}/server

            # Rebuild and restart containers (API+DB+Redis)
            docker compose up -d --build

            echo "Deployment completed at $(date)"
          EOF
