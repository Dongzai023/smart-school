# Agent 配置文件

# 服务器地址（腾讯云服务器公网IP或域名）
server:
  host: "lock.qjzxmd.cn"
  port: 443
  use_ssl: true  # 使用 WSS 加密连接
  verify_ssl: false # 是否验证 SSL 证书（如果出现证书不匹配报错，可设为 false）

# Agent 密钥（创建设备时由服务器生成，复制到此处）
agent_key: "d9aaff0e03ec4a2e833285ea29d08a9b"

# 心跳间隔（秒）
heartbeat_interval: 30

# 锁屏画面缓存目录
image_cache_dir: "./cache"

# 日志配置
log_file: "./agent.log"
